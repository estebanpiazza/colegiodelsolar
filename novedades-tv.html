<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Del Solar · Pantalla de entrada</title>
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --color-ink:          #10438a;
            --color-ink-soft:     #1a5299;
            --color-accent:       #fdcd24;
            --color-bg:           #eef2f8;
            --color-surface:      #ffffff;
            --color-surface-soft: #f2f5f9;
            --color-line:         #d9e0ea;
            --color-text:         #505050;
            --color-muted:        #5a6a7e;
            --shadow-sm:          0 8px 24px rgba(0,65,140,0.07);
            --radius-md:          1.25rem;
            --radius-sm:          0.75rem;
            --font-serif:         'Cormorant Garamond', Georgia, serif;
            --font-sans:          'Manrope', system-ui, sans-serif;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100vw; height: 100vh;
            overflow: hidden;
            background: var(--color-bg);
            font-family: var(--font-sans);
            color: var(--color-text);
            -webkit-font-smoothing: antialiased;
        }

        img, video { display: block; max-width: 100%; }
        a { color: inherit; text-decoration: none; }
        ul { list-style: none; }

        /* ── Estructura ── */
        .screen {
            display: grid;
            grid-template-rows: 4.8rem 1fr;
            height: 100vh;
            width: 100vw;
        }

        /* ── Top bar ── */
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
            background: var(--color-surface);
            border-bottom: 2px solid var(--color-line);
            flex-shrink: 0;
        }

        .topbar__logo { height: 2.7rem; }

        .topbar__center { text-align: center; }

        .topbar__date {
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--color-muted);
        }

        .topbar__clock {
            font-family: var(--font-serif);
            font-size: 2.6rem;
            font-weight: 600;
            color: var(--color-ink);
            line-height: 1;
            letter-spacing: 0.06em;
        }

        /* ── Carrusel de escenas ── */
        .main-grid {
            position: relative;
            padding: 1rem 1.2rem 1.1rem;
            height: 100%;
            overflow: hidden;
        }

        .scene-carousel {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .scene {
            position: absolute;
            inset: 0;
            opacity: 0;
            transform: translateX(2.5%);
            transition: opacity 0.55s ease, transform 0.55s ease;
            pointer-events: none;
            display: flex;
        }

        .scene.is-active {
            opacity: 1;
            transform: translateX(0);
            pointer-events: auto;
        }

        .scene .card {
            width: 100%;
            max-width: 100%;
            height: 100%;
        }

        .scene-indicators {
            position: absolute;
            left: 50%;
            bottom: 0.35rem;
            transform: translateX(-50%);
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.4rem 0.75rem;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.88);
            border: 1px solid var(--color-line);
            z-index: 15;
        }

        .scene-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #bfccde;
            transition: transform 0.3s ease, background 0.3s ease;
        }

        .scene-indicator.is-active {
            transform: scale(1.5);
            background: var(--color-ink);
        }

        /* ── Tarjeta base ── */
        .card {
            background: var(--color-surface);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-sm);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-height: 0;
            height: 100%;
        }

        .card__header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.92rem 1.45rem 0.82rem;
            border-bottom: 1.5px solid var(--color-line);
            flex-shrink: 0;
        }

        .card__dot {
            width: 9px; height: 9px;
            border-radius: 50%;
            background: var(--color-accent);
            flex-shrink: 0;
        }

        .card__eyebrow {
            font-size: 0.84rem;
            font-weight: 800;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: var(--color-ink);
        }

        .card__body {
            flex: 1;
            overflow: hidden;
            position: relative;
            min-height: 0;
        }

        /* ════════════════════════════════════════
           NOVEDADES · slider (fade entre items)
        ════════════════════════════════════════ */

        .novedades-viewport {
            height: 100%;
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .novedades-slides-wrap {
            flex: 1;
            position: relative;
            min-height: 0;
        }

        .novedades-slide {
            position: absolute;
            inset: 0;
            opacity: 0;
            transition: opacity 0.7s ease;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .novedades-slide.is-active {
            opacity: 1;
            pointer-events: auto;
        }

        /* Con imagen: img arriba / texto abajo */
        .novedad-item--with-img {
            display: grid;
            grid-template-columns: minmax(0, 1.2fr) minmax(0, 1fr);
            flex: 1;
        }

        .novedad-item__img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Sin imagen: sólo texto */
        .novedad-item--text-only {
            padding: 2.2rem 2.35rem;
            display: flex;
            flex-direction: column;
            gap: 0.85rem;
            flex: 1;
            justify-content: center;
        }

        .novedad-item__content {
            padding: 1.5rem 1.8rem 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.72rem;
            justify-content: center;
        }

        .novedad-item__tag {
            display: inline-flex;
            width: fit-content;
            padding: 0.3rem 0.95rem;
            background: var(--color-accent);
            color: var(--color-ink);
            border-radius: 999px;
            font-size: 0.78rem;
            font-weight: 800;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        .novedad-item__title {
            font-family: var(--font-serif);
            font-size: clamp(2.1rem, 4vw, 3.55rem);
            line-height: 0.98;
            color: var(--color-ink);
        }

        .novedad-item__body {
            font-size: clamp(1.08rem, 1.45vw, 1.5rem);
            color: var(--color-muted);
            line-height: 1.45;
            max-width: 78ch;
        }

        /* Dots del slider */
        .novedades-dots {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.7rem;
            padding: 0.85rem 1rem;
            flex-shrink: 0;
            border-top: 1.5px solid var(--color-line);
        }

        .novedades-dot {
            width: 11px; height: 11px;
            border-radius: 50%;
            background: var(--color-line);
            transition: background 0.35s, transform 0.35s;
        }

        .novedades-dot.is-active {
            background: var(--color-ink);
            transform: scale(1.5);
        }

        /* ════════════════════════════════════════
           CUMPLEANOS · festivo
        ════════════════════════════════════════ */

        @keyframes popIn {
            0%   { transform: scale(0.5) rotate(-8deg); opacity: 0; }
            60%  { transform: scale(1.08) rotate(1deg); }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        @keyframes floatBounce {
            0%, 100% { transform: translateY(0) scale(1); }
            45%       { transform: translateY(-5px) scale(1.05); }
            70%       { transform: translateY(-2px) scale(1.02); }
        }

        @keyframes floatUp {
            0%   { top: 105%; opacity: 0; transform: rotate(0deg); }
            10%  { opacity: 0.4; }
            90%  { opacity: 0.15; }
            100% { top: -10%; opacity: 0; transform: rotate(22deg); }
        }

        @keyframes pulseEmoji {
            0%, 100% { transform: scale(1) rotate(0deg); }
            50%       { transform: scale(1.3) rotate(12deg); }
        }

        .cumple-header-emoji {
            display: inline-block;
            animation: pulseEmoji 2s ease-in-out infinite;
            margin-left: 0.2rem;
        }

        .cumple-list {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            padding: 1.2rem 1.45rem;
            overflow-y: auto;
            height: 100%;
            scrollbar-width: none;
            position: relative;
            z-index: 1;
        }

        .cumple-list::-webkit-scrollbar { display: none; }

        .cumple-item {
            display: flex;
            align-items: center;
            gap: 0.95rem;
            padding: 1rem 1.15rem;
            border-radius: var(--radius-sm);
            animation: popIn 0.5s ease both;
            background: linear-gradient(180deg, #ffffff 0%, #fbfdff 100%);
            border: 1px solid rgba(16, 67, 138, 0.08);
        }

        .cumple-item__avatar {
            width: 3.6rem; height: 3.6rem;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--color-ink), var(--color-ink-soft));
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: 800;
            font-size: 1.02rem;
            flex-shrink: 0;
            animation: floatBounce 2.8s ease-in-out infinite;
            box-shadow: 0 4px 12px rgba(16,67,138,0.22);
        }

        .cumple-item__info { flex: 1; min-width: 0; }

        .cumple-item__name {
            font-weight: 700;
            font-size: clamp(1.3rem, 2vw, 1.95rem);
            line-height: 1.12;
            color: var(--color-ink);
            white-space: normal;
            overflow-wrap: anywhere;
        }

        .cumple-item__grado {
            font-size: clamp(0.95rem, 1.2vw, 1.2rem);
            color: var(--color-muted);
        }

        .cumple-item__badge {
            flex-shrink: 0;
            font-size: 0.88rem;
            font-weight: 700;
            color: var(--color-ink-soft);
            background: var(--color-surface-soft);
            border: 1.5px solid var(--color-line);
            padding: 0.34rem 0.78rem;
            border-radius: 999px;
        }

        .cumple-float {
            position: absolute;
            top: 105%;
            pointer-events: none;
            font-size: 1rem;
            z-index: 0;
            animation: floatUp var(--dur, 6s) ease-in-out var(--delay, 0s) infinite;
        }

        .cumple-empty {
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            color: var(--color-muted);
        }

        .cumple-empty__icon { font-size: 3rem; }
        .cumple-empty__text { font-size: 0.92rem; font-weight: 600; }

        /* ════════════════════════════════════════
           INSTAGRAM · columna completa, iframe
        ════════════════════════════════════════ */

        .ig-body {
            height: 100%;
            display: flex;
            flex-direction: column;
            background: #fafafa;
        }

        .ig-video-wrap {
            position: relative;
            width: 100%;
            height: 100%;
            background: #000;
        }

        .ig-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        @media (max-width: 1200px) {
            .novedad-item--with-img {
                grid-template-columns: 1fr;
                grid-template-rows: 52% 48%;
            }

            .novedad-item__title {
                font-size: clamp(1.7rem, 3.2vw, 2.35rem);
            }

            .novedad-item__body {
                font-size: clamp(0.98rem, 1.7vw, 1.2rem);
            }

            .cumple-item__name {
                font-size: clamp(1.05rem, 1.9vw, 1.4rem);
            }
        }

        .ig-frame {
            flex: 1;
            width: 100%;
            border: none;
            display: block;
            background: #fafafa;
        }

        .ig-placeholder {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            padding: 1.5rem;
            background: linear-gradient(145deg, #fdf4ff 0%, #fce8f3 50%, #fff0e8 100%);
            text-align: center;
        }

        .ig-placeholder__icon {
            width: 4rem; height: 4rem;
            background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
            border-radius: 1.1rem;
            display: flex; align-items: center; justify-content: center;
            color: #fff;
        }

        .ig-placeholder__handle {
            font-family: var(--font-serif);
            font-size: 1.7rem;
            font-weight: 700;
            color: var(--color-ink);
        }

        .ig-placeholder__note {
            font-size: 0.74rem;
            color: var(--color-muted);
            max-width: 280px;
            line-height: 1.6;
        }

        .ig-placeholder__code {
            font-family: monospace;
            font-size: 0.72rem;
            background: rgba(0,0,0,0.06);
            padding: 0.5rem 0.9rem;
            border-radius: 0.5rem;
            color: var(--color-ink);
        }

        /* ── Skeleton ── */
        @keyframes shimmer {
            0%   { background-position: -600px 0; }
            100% { background-position:  600px 0; }
        }

        .skeleton {
            background: linear-gradient(90deg, #ececec 25%, #e0e0e0 50%, #ececec 75%);
            background-size: 1200px 100%;
            animation: shimmer 1.6s infinite;
            border-radius: 0.4rem;
        }
    </style>
</head>
<body>

<div class="screen">

    <!-- TOP BAR -->
    <header class="topbar">
        <img src="Logo-Del-Solar (1).png" alt="Colegio Del Solar" class="topbar__logo">
        <div class="topbar__center">
            <div class="topbar__date" id="js-date">--</div>
        </div>
        <div class="topbar__clock" id="js-clock">00:00</div>
    </header>

    <!-- CARRUSEL DE ESCENAS -->
    <div class="main-grid">
        <div class="scene-carousel" id="scene-carousel" aria-live="off">

            <!-- ESCENA 1: Novedades -->
            <section class="scene is-active" data-scene="novedades">
                <div class="card" id="card-novedades">
                    <div class="card__header">
                        <span class="card__dot"></span>
                        <span class="card__eyebrow">Novedades</span>
                    </div>
                    <div class="card__body">
                        <div class="novedades-viewport" id="novedades-viewport">
                            <div class="novedades-slides-wrap">
                                <div class="novedades-slide is-active">
                                    <!-- Skeleton inicial -->
                                    <div class="novedad-item--text-only">
                                        <div class="skeleton" style="height:0.75rem;width:5rem"></div>
                                        <div class="skeleton" style="height:1.5rem;width:85%"></div>
                                        <div class="skeleton" style="height:0.85rem;width:100%"></div>
                                        <div class="skeleton" style="height:0.85rem;width:88%"></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <!-- ESCENA 2: Video / Instagram -->
            <section class="scene" data-scene="video">
                <div class="card" id="card-instagram">
                    <div class="card__header">
                        <span class="card__dot"
                              style="background:linear-gradient(45deg,#f09433,#bc1888)"></span>
                        <span class="card__eyebrow">Video del colegio</span>
                        <span style="margin-left:auto;font-size:0.7rem;color:var(--color-muted);font-weight:700">
                            @delsolarschool
                        </span>
                    </div>
                    <div class="card__body">
                        <div class="ig-body" id="ig-body">
                            <!--
                            COMO CONFIGURAR:
                            1) Recomendado: poner un MP4 directo en CONFIG.VIDEO_URL para reproduccion continua.
                            2) Si VIDEO_URL esta vacio, se intenta Instagram (instagram_latest.json o CONFIG.INSTAGRAM_POST_URL).

                            URL del post permitida:
                            https://www.instagram.com/p/SHORTCODE/
                            https://www.instagram.com/reel/SHORTCODE/
                            -->
                        </div>
                    </div>
                </div>
            </section>

            <!-- ESCENA 3: Cumpleaños -->
            <section class="scene" data-scene="cumple">
                <div class="card" id="card-cumple">
                    <div class="card__header">
                        <span class="card__dot" style="background:#f97316"></span>
                        <span class="card__eyebrow">Cumpleaños <span class="cumple-header-emoji">🎂</span></span>
                        <span id="cumple-range-label"
                              style="margin-left:auto;font-size:0.68rem;color:var(--color-muted);font-weight:700"></span>
                    </div>
                    <div class="card__body">
                        <div class="cumple-list" id="cumple-list">
                            <div class="cumple-item">
                                <div class="skeleton" style="width:2.7rem;height:2.7rem;border-radius:50%;flex-shrink:0"></div>
                                <div style="flex:1;display:flex;flex-direction:column;gap:0.4rem">
                                    <div class="skeleton" style="height:0.9rem;width:70%"></div>
                                    <div class="skeleton" style="height:0.7rem;width:44%"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <div class="scene-indicators" id="scene-indicators" aria-hidden="true">
                <span class="scene-indicator is-active"></span>
                <span class="scene-indicator"></span>
                <span class="scene-indicator"></span>
            </div>
        </div>
    </div>
</div>

<script>
"use strict";

// ═══════════════════════════════════════
//  CONFIGURACION
// ═══════════════════════════════════════
const CONFIG = {
    // Google Sheets publicado como CSV
    // Columnas: etiqueta | titulo | cuerpo | imagen_url
    NOVEDADES_CSV_URL: '',   // pegar URL aqui

    // CSV de cumpleanios. Columnas: nombre | grado | fecha (DD/MM)
    CUMPLE_CSV_URL: 'cumpleaniosCDS.csv',

    // URL del post de Instagram a mostrar:
    //   https://www.instagram.com/p/SHORTCODE/
    //   https://www.instagram.com/reel/SHORTCODE/
    // El iframe carga fotos, carruseles y videos directamente.
    INSTAGRAM_POST_URL: '',  // pegar URL aqui

    // Video MP4 directo (opcional). Si esta presente, se muestra este video.
    // Si queda vacio, se usa Instagram como fallback.
    VIDEO_URL: '',

    // Duraciones de escenas (milisegundos):
    // [novedades, video, cumpleanios]
    SCENE_DURATIONS: [12000, 11000, 10000],

    // Tiempo del slider interno de novedades.
    NOVEDADES_SLIDE_MS: 6000,
};

// ═══════════════════════════════════════
//  DATOS PLACEHOLDER
// ═══════════════════════════════════════
const NOVEDADES_PLACEHOLDER = [
    {
        etiqueta: 'Institucional',
        titulo: 'Jornada de puertas abiertas',
        cuerpo: 'El proximo sabado abrimos las puertas para que las familias interesadas conozcan el proyecto educativo Del Solar. Los esperamos de 10 a 13 h.',
        imagen_url: '',
    },
    {
        etiqueta: 'Academico',
        titulo: 'Semana de la ciencia en primaria',
        cuerpo: 'Durante toda esta semana los alumnos de primaria realizaran experimentos e investigaciones en el marco del proyecto Cientificos Del Solar.',
        imagen_url: '',
    },
    {
        etiqueta: 'Deportes',
        titulo: 'Torneo interescolar de basquet',
        cuerpo: 'Nuestros equipos Sub-14 y Sub-17 participaran este viernes y sabado en el torneo interescolar. Vamos, Del Solar!',
        imagen_url: '',
    },
];

const CUMPLE_PLACEHOLDER = [
    { nombre: 'Valentina Garcia',  grado: '3 A - Primaria', fecha: '' },
    { nombre: 'Tomas Rodriguez',   grado: '6 B - Primaria', fecha: '' },
    { nombre: 'Lucia Fernandez',   grado: '1 C - Inicial',  fecha: '' },
    { nombre: 'Mateo Lopez',       grado: '4 A - Primaria', fecha: '' },
];

// ═══════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════
function escHtml(str) {
    return String(str ?? '')
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function parseCSV(text) {
    const lines = text.replace(/^\uFEFF/, '').trim().split(/\r?\n/).filter(l => l.trim());
    if (lines.length < 2) return [];
    const headers = splitCSVLine(lines[0]).map(h => h.toLowerCase().trim());
    return lines.slice(1).map(line => {
        const cols = splitCSVLine(line);
        const obj  = {};
        headers.forEach((h, i) => { obj[h] = (cols[i] ?? '').trim(); });
        return obj;
    });
}

function splitCSVLine(line) {
    const cols = []; let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
        const ch = line[i];
        if (ch === '"' && inQ && line[i + 1] === '"') { cur += '"'; i++; }
        else if (ch === '"') { inQ = !inQ; }
        else if (ch === ',' && !inQ) { cols.push(cur); cur = ''; }
        else { cur += ch; }
    }
    cols.push(cur);
    return cols;
}

// ═══════════════════════════════════════
//  RELOJ
// ═══════════════════════════════════════
const DAYS   = ['Domingo','Lunes','Martes','Miercoles','Jueves','Viernes','Sabado'];
const MONTHS = ['enero','febrero','marzo','abril','mayo','junio','julio',
                'agosto','septiembre','octubre','noviembre','diciembre'];

function updateClock() {
    const now = new Date();
    const hh  = String(now.getHours()).padStart(2,'0');
    const mm  = String(now.getMinutes()).padStart(2,'0');
    document.getElementById('js-clock').textContent = hh + ':' + mm;
    document.getElementById('js-date').textContent  =
        DAYS[now.getDay()] + ' ' + now.getDate() + ' de ' +
        MONTHS[now.getMonth()] + ' de ' + now.getFullYear();
}
updateClock();
setInterval(updateClock, 10000);

// ═══════════════════════════════════════
//  AUTO-REFRESH A MEDIANOCHE
// ═══════════════════════════════════════

    const now = new Date();

// ═══════════════════════════════════════
//  NOVEDADES - slider (fade entre items)
// ═══════════════════════════════════════
function buildNovedades(items) {
    const viewport = document.getElementById('novedades-viewport');
    viewport.innerHTML = '';

    const wrap = document.createElement('div');
    wrap.className = 'novedades-slides-wrap';
    const dotsEl = document.createElement('div');
    dotsEl.className = 'novedades-dots';

    items.forEach(function(item, idx) {
        const safeImg = item.imagen_url &&
            /^(https:\/\/|\/|\.\/|\.\.\/)/.test(item.imagen_url.trim())
            ? item.imagen_url.trim() : '';

        const slide = document.createElement('div');
        slide.className = 'novedades-slide' + (idx === 0 ? ' is-active' : '');

        const inner = document.createElement('div');
        if (safeImg) {
            inner.className = 'novedad-item--with-img';
            inner.style.height = '100%';
            const img = document.createElement('img');
            img.src = safeImg;
            img.alt = escHtml(item.titulo);
            img.className = 'novedad-item__img';
            img.loading = 'lazy';
            inner.appendChild(img);
            const content = document.createElement('div');
            content.className = 'novedad-item__content';
            content.innerHTML =
                (item.etiqueta ? '<span class="novedad-item__tag">' + escHtml(item.etiqueta) + '</span>' : '') +
                '<h2 class="novedad-item__title">' + escHtml(item.titulo) + '</h2>' +
                '<p class="novedad-item__body">' + escHtml(item.cuerpo) + '</p>';
            inner.appendChild(content);
        } else {
            inner.className = 'novedad-item--text-only';
            inner.innerHTML =
                (item.etiqueta ? '<span class="novedad-item__tag">' + escHtml(item.etiqueta) + '</span>' : '') +
                '<h2 class="novedad-item__title">' + escHtml(item.titulo) + '</h2>' +
                '<p class="novedad-item__body">' + escHtml(item.cuerpo) + '</p>';
        }
        slide.appendChild(inner);
        wrap.appendChild(slide);

        const dot = document.createElement('span');
        dot.className = 'novedades-dot' + (idx === 0 ? ' is-active' : '');
        dotsEl.appendChild(dot);
    });

    viewport.appendChild(wrap);
    if (items.length > 1) viewport.appendChild(dotsEl);

    if (items.length > 1) {
        const slides = Array.from(wrap.querySelectorAll('.novedades-slide'));
        const dots   = Array.from(dotsEl.querySelectorAll('.novedades-dot'));
        let current  = 0;
        setInterval(function() {
            slides[current].classList.remove('is-active');
            dots[current].classList.remove('is-active');
            current = (current + 1) % slides.length;
            slides[current].classList.add('is-active');
            dots[current].classList.add('is-active');
        }, Math.max(2000, Number(CONFIG.NOVEDADES_SLIDE_MS) || 6000));
    }
}

async function loadNovedades() {
    if (!CONFIG.NOVEDADES_CSV_URL.trim()) {
        buildNovedades(NOVEDADES_PLACEHOLDER); return;
    }
    try {
        const res  = await fetch(CONFIG.NOVEDADES_CSV_URL, { cache: 'no-store' });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const rows = parseCSV(await res.text());
        buildNovedades(rows.length ? rows : NOVEDADES_PLACEHOLDER);
    } catch(e) {
        console.warn('[novedades]', e.message);
        buildNovedades(NOVEDADES_PLACEHOLDER);
    }
}

// ═══════════════════════════════════════
//  CUMPLEANIOS
// ═══════════════════════════════════════
function getDatesToShow() {
    const pad = n => String(n).padStart(2,'0');
    const today = new Date();
    const dow   = today.getDay();
    const dates = [{ label:'Hoy', key: pad(today.getDate())+'/'+pad(today.getMonth()+1), order: 0 }];
    if (dow === 5) {
        const sat = new Date(today); sat.setDate(today.getDate()+1);
        const sun = new Date(today); sun.setDate(today.getDate()+2);
        dates.push({ label:'Sab', key: pad(sat.getDate())+'/'+pad(sat.getMonth()+1), order: 1 });
        dates.push({ label:'Dom', key: pad(sun.getDate())+'/'+pad(sun.getMonth()+1), order: 2 });
    }
    return dates;
}

function normalizeBirthdayDate(fecha) {
    const pad = n => String(n).padStart(2,'0');
    const match = String(fecha || '').trim().match(/^(\d{1,2})\/(\d{1,2})/);
    return match ? pad(match[1]) + '/' + pad(match[2]) : '';
}

function renderCumple(items) {
    const dates     = getDatesToShow();
    const dateIndex = Object.fromEntries(dates.map(d => [d.key, d]));
    const list      = document.getElementById('cumple-list');
    const rangeEl   = document.getElementById('cumple-range-label');

    const matching = items
        .map((item, index) => {
            const key = normalizeBirthdayDate(item.fecha);
            const day = dateIndex[key];
            return day ? Object.assign({}, item, {
                __dayLabel: day.label,
                __dayOrder: day.order,
                __rowOrder: index,
            }) : null;
        })
        .filter(Boolean)
        .sort((a, b) => (a.__dayOrder - b.__dayOrder) || (a.__rowOrder - b.__rowOrder));

    rangeEl.textContent = dates.length > 1 ? 'Vie - Sab - Dom' : DAYS[new Date().getDay()];
    list.innerHTML = '';

    if (!matching.length) {
        list.innerHTML =
            '<div class="cumple-empty">' +
            '<div class="cumple-empty__icon">🎈</div>' +
            '<div class="cumple-empty__text">No hay cumpleanios ' +
            (dates.length > 1 ? 'este fin de semana' : 'hoy') +
            '</div></div>';
        return;
    }

    matching.forEach(function(item, idx) {
        const initials = item.nombre.split(' ').filter(w => w.length > 1)
            .slice(0,2).map(w => w[0].toUpperCase()).join('');
        const el = document.createElement('div');
        el.className = 'cumple-item';
        el.style.animationDelay = (idx * 0.12) + 's';
        el.innerHTML =
            '<div class="cumple-item__avatar" style="animation-delay:' + (idx * 0.35) + 's">' + escHtml(initials) + '</div>' +
            '<div class="cumple-item__info">' +
            '<div class="cumple-item__name">' + escHtml(item.nombre) + '</div>' +
            '<div class="cumple-item__grado">' + escHtml(item.grado || '') + '</div>' +
            '</div>' +
            '<span class="cumple-item__badge">' + escHtml(item.__dayLabel) + '</span>';
        list.appendChild(el);
    });

    // Emojis flotantes festivos
    const cardBody = document.querySelector('#card-cumple .card__body');
    if (cardBody) {
        cardBody.querySelectorAll('.cumple-float').forEach(function(e) { e.remove(); });
        ['🎂', '🎈', '🎉', '✨', '🎁', '🎊'].forEach(function(emoji, i) {
            const span = document.createElement('span');
            span.className = 'cumple-float';
            span.textContent = emoji;
            span.style.cssText =
                'left:' + (8 + i * 15) + '%;' +
                '--dur:' + (5 + i * 0.7) + 's;' +
                '--delay:' + (i * 1.1) + 's;';
            cardBody.appendChild(span);
        });
    }
}

async function loadCumple() {
    if (!CONFIG.CUMPLE_CSV_URL.trim()) {
        const today = new Date();
        const pad   = n => String(n).padStart(2,'0');
        const key   = pad(today.getDate())+'/'+pad(today.getMonth()+1);
        renderCumple(CUMPLE_PLACEHOLDER.map(p => Object.assign({}, p, { fecha: key })));
        return;
    }
    try {
        const res  = await fetch(CONFIG.CUMPLE_CSV_URL, { cache: 'no-store' });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const rows = parseCSV(await res.text());
        renderCumple(rows.length ? rows : CUMPLE_PLACEHOLDER);
    } catch(e) {
        console.warn('[cumple]', e.message);
        renderCumple(CUMPLE_PLACEHOLDER);
    }
}

// ═══════════════════════════════════════
//  INSTAGRAM
//  Usa el endpoint de embed oficial de Instagram:
//  instagram.com/p/{shortcode}/embed/captioned/
//  Funciona para fotos, carruseles y videos sin API key.
//  Solo hay que pegar la URL del post en CONFIG.INSTAGRAM_POST_URL.
// ═══════════════════════════════════════
function getInstagramTarget(url) {
    const m = String(url).match(/instagram\.com\/(p|reel|tv)\/([A-Za-z0-9_-]+)/);
    return m ? { type: m[1], shortcode: m[2] } : null;
}

function showInstagramEmbed(url) {
    const container = document.getElementById('ig-body');
    const target = getInstagramTarget(url);
    if (!target) {
        console.warn('[instagram] URL invalida:', url);
        showInstagramPlaceholder('URL de Instagram invalida.');
        return;
    }
    var embedType = target.type === 'tv' ? 'p' : target.type;
    var embedUrl = 'https://www.instagram.com/' + embedType + '/' + encodeURIComponent(target.shortcode) + '/embed/captioned/';
    container.innerHTML =
        '<iframe class="ig-frame"' +
        ' src="' + escHtml(embedUrl) + '"' +
        ' scrolling="no"' +
        ' allowtransparency="true"' +
        ' allow="encrypted-media"' +
        ' title="Instagram @delsolarschool">' +
        '</iframe>';
}

function showDirectVideo(videoUrl) {
    var container = document.getElementById('ig-body');
    if (!container || !videoUrl) return false;

    var safeUrl = String(videoUrl).trim();
    if (!/^(https:\/\/|\.\/|\.\.\/|\/)/.test(safeUrl)) return false;

    container.innerHTML =
        '<div class="ig-video-wrap">' +
        '<video class="ig-video" autoplay muted loop playsinline preload="auto" controls>' +
        '<source src="' + escHtml(safeUrl) + '">' +
        '</video>' +
        '</div>';
    return true;
}

function showInstagramPlaceholder(msg) {
    var container = document.getElementById('ig-body');
    container.innerHTML =
        '<div class="ig-placeholder">' +
        '<div class="ig-placeholder__icon">' +
        '<svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24"' +
        ' fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
        '<rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>' +
        '<path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/>' +
        '<line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg></div>' +
        '<div class="ig-placeholder__handle">@delsolarschool</div>' +
        '<p class="ig-placeholder__note">' + escHtml(msg) + '</p>' +
        '</div>';
}

async function renderInstagram() {
    if (showDirectVideo(CONFIG.VIDEO_URL)) {
        return;
    }

    // 1. Intentar leer instagram_latest.json generado por get_instagram_post.py
    //    (se actualiza automaticamente cada noche via Tarea Programada de Windows)
    try {
        var res = await fetch('instagram_latest.json?v=' + Date.now(), { cache: 'no-store' });
        if (res.ok) {
            var data = await res.json();
            if (data.video_url && showDirectVideo(data.video_url)) {
                return;
            }
            if (data.url && data.url.trim()) {
                showInstagramEmbed(data.url.trim());
                return;
            }
        }
    } catch(e) {
        console.info('[instagram] instagram_latest.json no disponible:', e.message);
    }

    // 2. Fallback: URL manual en CONFIG
    if (CONFIG.INSTAGRAM_POST_URL.trim()) {
        showInstagramEmbed(CONFIG.INSTAGRAM_POST_URL.trim());
        return;
    }

    // 3. Sin datos: mostrar placeholder con instrucciones
    showInstagramPlaceholder(
        'Definir CONFIG.VIDEO_URL con un MP4 directo o ejecutar tools/setup_task.ps1 para Instagram automatico.'
    );
}

function startSceneCarousel() {
    var scenes = Array.from(document.querySelectorAll('.scene-carousel .scene'));
    var dots = Array.from(document.querySelectorAll('#scene-indicators .scene-indicator'));
    if (scenes.length <= 1) return;

    var durations = Array.isArray(CONFIG.SCENE_DURATIONS) ? CONFIG.SCENE_DURATIONS : [];
    var index = 0;
    var timerId = null;

    function activate(nextIndex) {
        scenes.forEach(function(scene, i) {
            scene.classList.toggle('is-active', i === nextIndex);
        });
        dots.forEach(function(dot, i) {
            dot.classList.toggle('is-active', i === nextIndex);
        });
        index = nextIndex;
    }

    function scheduleNext() {
        window.clearTimeout(timerId);
        var ms = Number(durations[index]);
        var delay = Number.isFinite(ms) && ms >= 2000 ? ms : 10000;

        timerId = window.setTimeout(function() {
            activate((index + 1) % scenes.length);
            scheduleNext();
        }, delay);
    }

    document.addEventListener('visibilitychange', function() {
        if (document.hidden) {
            window.clearTimeout(timerId);
            return;
        }
        scheduleNext();
    });

    activate(0);
    scheduleNext();
}

// ═══════════════════════════════════════
//  INIT
// ═══════════════════════════════════════
loadNovedades();
loadCumple();
renderInstagram();
startSceneCarousel();
</script>
